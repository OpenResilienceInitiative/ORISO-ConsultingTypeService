name: Temp GHCR Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - ci

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: openresilienceinitiative
  IMAGE_NAME: oriso-consultingtypeservice

jobs:
  build-and-push-smoke:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build app artifact
      run: ./mvnw -B -Dmaven.test.skip=true package

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (smoke tags)
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha
          type=raw,value=ci-manual

    - name: Build and push smoke image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Summary
      run: |
        echo "### GHCR Smoke Result" >> $GITHUB_STEP_SUMMARY
        echo "Image: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "Tags:" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "Digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
